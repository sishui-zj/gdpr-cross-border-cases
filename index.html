<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  :root {
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --primary: #1a56db;
    --primary-light: #e8eefb;
    --danger: #dc2626;
    --danger-light: #fef2f2;
    --warning: #f59e0b;
    --warning-light: #fffbeb;
    --success: #059669;
    --success-light: #ecfdf5;
    --info: #6366f1;
    --info-light: #eef2ff;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

  /* Header */
  .header { background: linear-gradient(135deg, #1e3a5f 0%, #1a56db 50%, #3b82f6 100%); color: #fff; padding: 48px 24px 36px; text-align: center; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,.05) 0%, transparent 60%); }
  .header h1 { font-size: 32px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; position: relative; }
  .header p { font-size: 15px; opacity: .85; position: relative; }

  /* Stats bar */
  .stats-bar { display: flex; justify-content: center; gap: 32px; padding: 20px 24px; background: var(--card-bg); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stat-item { text-align: center; }
  .stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: 13px; color: var(--text-secondary); }

  /* Controls */
  .controls { max-width: 1320px; margin: 24px auto; padding: 0 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .search-box { flex: 1; min-width: 260px; position: relative; }
  .search-box input { width: 100%; padding: 12px 16px 12px 44px; border: 2px solid var(--border); border-radius: var(--radius); font-size: 15px; transition: border-color .2s; background: var(--card-bg); }
  .search-box input:focus { outline: none; border-color: var(--primary); }
  .search-box .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 18px; }
  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-select { padding: 10px 14px; border: 2px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--card-bg); cursor: pointer; color: var(--text); min-width: 140px; }
  .filter-select:focus { outline: none; border-color: var(--primary); }

  /* Sort controls */
  .sort-bar { max-width: 1320px; margin: 0 auto 16px; padding: 0 24px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); flex-wrap: wrap; }
  .sort-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--card-bg); cursor: pointer; font-size: 13px; transition: all .2s; color: var(--text-secondary); }
  .sort-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .sort-btn:hover { border-color: var(--primary); }
  .result-count { margin-left: auto; }

  /* Cards grid */
  .cards { max-width: 1320px; margin: 0 auto; padding: 0 24px 48px; display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }
  @media (max-width: 500px) { .cards { grid-template-columns: 1fr; } }

  .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: transform .2s, box-shadow .2s; cursor: pointer; border: 1px solid var(--border); }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .card-top { padding: 20px 20px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-company { font-size: 20px; font-weight: 700; color: var(--text); }
  .card-fine { font-size: 18px; font-weight: 700; white-space: nowrap; }
  .fine-high { color: var(--danger); }
  .fine-mid { color: var(--warning); }
  .fine-low { color: var(--text-secondary); }

  .card-body { padding: 12px 20px 16px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .tag-country { background: var(--primary-light); color: var(--primary); }
  .tag-dest { background: var(--danger-light); color: var(--danger); }
  .tag-status-closed { background: var(--success-light); color: var(--success); }
  .tag-status-appealing { background: var(--warning-light); color: #b45309; }
  .tag-status-pending { background: var(--info-light); color: var(--info); }
  .tag-status-investigating { background: #fdf4ff; color: #9333ea; }
  .tag-risk-high { background: var(--danger-light); color: var(--danger); }
  .tag-risk-mid { background: var(--warning-light); color: #b45309; }
  .tag-risk-low { background: var(--success-light); color: var(--success); }
  .tag-industry { background: #f0fdf4; color: #15803d; }

  .card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-secondary); }
  .card-date { display: flex; align-items: center; gap: 4px; }
  .card-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
  .card-link a:hover { text-decoration: underline; }

  /* Modal overlay */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; justify-content: center; align-items: center; padding: 24px; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--card-bg); border-radius: var(--radius); max-width: 780px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .modal-header { padding: 24px 28px 0; display: flex; justify-content: space-between; align-items: flex-start; }
  .modal-header h2 { font-size: 24px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-secondary); padding: 0 4px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 28px 28px; }
  .detail-section { margin-bottom: 20px; }
  .detail-section h3 { font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid var(--primary-light); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .detail-grid { grid-template-columns: 1fr; } }
  .detail-item label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 2px; }
  .detail-item span { font-size: 15px; font-weight: 500; }
  .detail-text { font-size: 14px; line-height: 1.8; color: var(--text); }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .insight-box { background: var(--warning-light); border-left: 4px solid var(--warning); padding: 14px 16px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.7; }

  /* No results */
  .no-results { text-align: center; padding: 80px 24px; color: var(--text-secondary); }
  .no-results .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>

}

function getStatusTagClass(status) {
  const map = { '已执行': 'tag-status-closed', '上诉中': 'tag-status-appealing', '调查中': 'tag-status-investigating', '投诉待审': 'tag-status-pending' };
  return map[status] || 'tag-status-pending';
}

function getRiskTagClass(level) {
  const map = { '高': 'tag-risk-high', '中': 'tag-risk-mid', '低': 'tag-risk-low' };
  return map[level] || 'tag-risk-mid';
}

function populateFilters() {
  const dests = [...new Set(CASES.map(c => c.destination))].sort();
  const regs = [...new Set(CASES.map(c => c.regulatorCountry))].sort();
  const industries = [...new Set(CASES.map(c => c.industry))].sort();
  const destSel = document.getElementById('filterDest');
  const regSel = document.getElementById('filterRegulator');
  const indSel = document.getElementById('filterIndustry');
  dests.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; destSel.appendChild(o); });
  regs.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; regSel.appendChild(o); });
  industries.forEach(i => { const o = document.createElement('option'); o.value = i; o.textContent = i; indSel.appendChild(o); });
}

function getFilteredCases() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const dest = document.getElementById('filterDest').value;
  const reg = document.getElementById('filterRegulator').value;
  const status = document.getElementById('filterStatus').value;
  const risk = document.getElementById('filterRisk').value;
  const ind = document.getElementById('filterIndustry').value;

  let filtered = CASES.filter(c => {
    if (query && !(c.company.toLowerCase().includes(query) || c.violation.toLowerCase().includes(query) || c.destination.toLowerCase().includes(query) || c.regulatorCountry.toLowerCase().includes(query) || c.industry.toLowerCase().includes(query) || c.regulatorBody.toLowerCase().includes(query) || c.chinaInsight.toLowerCase().includes(query))) return false;
    if (dest && c.destination !== dest) return false;
    if (reg && c.regulatorCountry !== reg) return false;
    if (status && c.status !== status) return false;
    if (risk && c.riskLevel !== risk) return false;
    if (ind && c.industry !== ind) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va, vb;
    if (currentSort === 'date') { va = a.date; vb = b.date; }
    else if (currentSort === 'fine') { va = a.fineAmount; vb = b.fineAmount; }
    else { va = a.company.toLowerCase(); vb = b.company.toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
  return filtered;
}

function renderStats() {
  const totalCases = CASES.length;
  const totalFine = CASES.reduce((s, c) => s + c.fineAmount, 0);
  const countries = new Set(CASES.map(c => c.regulatorCountry)).size;
  const companies = new Set(CASES.map(c => c.company)).size;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><div class="stat-number">${totalCases}</div><div class="stat-label">收录案例</div></div>
    <div class="stat-item"><div class="stat-number">&euro;${(totalFine / 1e9).toFixed(2)}B</div><div class="stat-label">累计罚款</div></div>
    <div class="stat-item"><div class="stat-number">${countries}</div><div class="stat-label">涉及国家/地区</div></div>
    <div class="stat-item"><div class="stat-number">${companies}</div><div class="stat-label">涉事企业</div></div>
  `;
}

function renderCards(cases) {
  const container = document.getElementById('cardsContainer');
  const noResults = document.getElementById('noResults');
  document.getElementById('resultCount').textContent = `共 ${cases.length} 条结果`;
  if (!cases.length) { container.innerHTML = ''; noResults.style.display = 'block'; return; }
  noResults.style.display = 'none';
  container.innerHTML = cases.map(c => `
    <div class="card" onclick="openModal(${c.id})">
      <div class="card-top">
        <span class="card-company">${c.company}</span>
        <span class="card-fine ${getFineCssClass(c.fineAmount)}">${c.fineDisplay}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="tag tag-country">${c.regulatorCountry}</span>
          <span class="tag tag-dest">→ ${c.destination}</span>
          <span class="tag ${getStatusTagClass(c.status)}">${c.status}</span>
          <span class="tag ${getRiskTagClass(c.riskLevel)}">风险：${c.riskLevel}</span>
          <span class="tag tag-industry">${c.industry}</span>
        </div>
        <div class="card-desc">${c.violation}</div>
      </div>
      <div class="card-footer">
        <span class="card-date">${c.date}</span>
        <span class="card-link"><a href="${c.sourceUrl}" target="_blank" onclick="event.stopPropagation();">${c.sourceName}</a></span>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const c = CASES.find(x => x.id === id);
  if (!c) return;
  document.getElementById('modalTitle').textContent = c.company;
  document.getElementById('modalBody').innerHTML = `
    <div class="detail-section">
      <h3>基础信息</h3>
      <div class="detail-grid">
        <div class="detail-item"><label>涉事企业</label><span>${c.company}</span></div>
        <div class="detail-item"><label>罚款金额</label><span class="${getFineCssClass(c.fineAmount)}" style="font-weight:700;font-size:18px;">${c.fineDisplay}</span></div>
        <div class="detail-item"><label>监管机构</label><span>${c.regulatorBody}</span></div>
        <div class="detail-item"><label>监管国家</label><span>${c.regulatorCountry}</span></div>
        <div class="detail-item"><label>处罚日期</label><span>${c.date}</span></div>
        <div class="detail-item"><label>法律依据</label><span>${c.legalBasis}</span></div>
        <div class="detail-item"><label>所属行业</label><span>${c.industry}</span></div>
        <div class="detail-item"><label>当前状态</label><span>${c.status}</span></div>
      </div>
    </div>
    <div class="detail-section">
      <h3>数据流向</h3>
      <div class="detail-grid">
        <div class="detail-item"><label>数据来源</label><span>${c.origin}</span></div>
        <div class="detail-item"><label>传输目的地</label><span style="color:var(--danger);font-weight:600;">${c.destination}</span></div>
      </div>
      <div style="margin-top:8px;"><label style="font-size:12px;color:var(--text-secondary);">数据流向描述</label><p class="detail-text">${c.dataFlow}</p></div>
      <div style="margin-top:8px;"><label style="font-size:12px;color:var(--text-secondary);">涉及数据类型</label><p class="detail-text">${c.dataTypes}</p></div>
    </div>
    <div class="detail-section">
      <h3>违规行为</h3>
      <p class="detail-text">${c.violation}</p>
    </div>
    <div class="detail-section">
      <h3>整改要求</h3>
      <p class="detail-text">${c.remedy}</p>
    </div>
    <div class="detail-section">
      <h3>上诉与后续</h3>
      <p class="detail-text">${c.appealStatus}</p>
    </div>
    <div class="detail-section">
      <h3>对中国出海企业的启示</h3>
      <div class="insight-box">${c.chinaInsight}</div>
    </div>
    <div class="detail-section">
      <h3>信息来源</h3>
      <p class="detail-text"><a href="${c.sourceUrl}" target="_blank" style="color:var(--primary);text-decoration:none;">${c.sourceName} — 查看原文</a></p>
    </div>
    <div class="detail-tags">
      <span class="tag tag-country">${c.regulatorCountry}</span>
      <span class="tag tag-dest">→ ${c.destination}</span>
      <span class="tag ${getStatusTagClass(c.status)}">${c.status}</span>
      <span class="tag ${getRiskTagClass(c.riskLevel)}">风险：${c.riskLevel}</span>
      <span class="tag tag-industry">${c.industry}</span>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function refresh() { renderCards(getFilteredCases()); }

// Event listeners
document.getElementById('searchInput').addEventListener('input', refresh);
document.getElementById('filterDest').addEventListener('change', refresh);
document.getElementById('filterRegulator').addEventListener('change', refresh);
document.getElementById('filterStatus').addEventListener('change', refresh);
document.getElementById('filterRisk').addEventListener('change', refresh);
document.getElementById('filterIndustry').addEventListener('change', refresh);
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const sort = btn.dataset.sort;
    if (currentSort === sort) { sortAsc = !sortAsc; }
    else { currentSort = sort; sortAsc = sort === 'company'; }
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    refresh();
  });
});

// Init
populateFilters();
renderStats();
refresh();
</script>
</body>
</html>
